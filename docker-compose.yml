services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanager-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_password123"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_password123 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - taskmanager-network

  # Database Initialization
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanager-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./database/init.sql:/init.sql:ro
    command: /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P Your_strong_password123 -C -i /init.sql"
    restart: "no"
    networks:
      - taskmanager-network

  # Backend API (.NET 8)
  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: taskmanager-api
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TaskManagerDb;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True;"
      Jwt__Issuer: "TaskManager"
      Jwt__Audience: "TaskManagerClient"
      Jwt__Secret: "CHANGE_THIS_SECRET_FOR_REAL_PROJECTS_1234567890"
    ports:
      - "8080:8080"
    networks:
      - taskmanager-network

  # Frontend (Angular 17+)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: taskmanager-frontend
    depends_on:
      - api
    ports:
      - "4200:80"
    networks:
      - taskmanager-network

networks:
  taskmanager-network:
    driver: bridge

volumes:
  sqlserver_data:
